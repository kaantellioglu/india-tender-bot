# V3.2 portal-specific source rules for market-intelligence extraction.
# No procurement transaction or protected portal interaction is in scope.

portals:
  gail_india:
    strategy: public_tender_and_aoc_archive
    max_leads: 250
    source_urls:
      - url: https://gailtenders.in/Gailtenders
        kind: active_tender
        reason: active_tender_search
      - url: https://gailtenders.in/Gailtenders/writereaddata/AOC/
        kind: award_archive
        reason: aoc_loa_foa_archive
    priority_keywords: [domestic regulator, service regulator, pressure regulator, RMS, MRS, DRS, PRS, gas filter, filter station, skid, AOC, LOA, FOA, award]
    noise_filters: [career, investor, photo, contact, sitemap]

  indraprastha_gas_igl:
    strategy: aggressive_table_scan
    max_leads: 300
    source_urls:
      - url: https://tenders.iglonline.net/tenderList
        kind: active_and_historical_table
        reason: tender_list_table
    priority_keywords: [domestic regulator, service regulator, pressure regulator, FRS, MRS, DRS, PRS, RMS, gas filter, filter station, skid]
    noise_filters: [login help, forgot password, registration guide, terms, privacy, contact us]

  gasonet_services:
    strategy: public_pdf_table
    max_leads: 200
    source_urls:
      - url: https://www.gasonet.in/tenders.html
        kind: public_tender_pdf_list
        reason: tender_pdf_page
    priority_keywords: [domestic regulator, service regulator, pressure regulator, meter regulator, gas tap, PNG regulator, filter]
    noise_filters: [career, contact, about]

  maharashtra_natural_gas_mngl:
    strategy: public_active_archive_scan
    max_leads: 160
    source_urls:
      - url: https://mngl.in/active-tenders
        kind: active_tender_table
        reason: active_tenders
    priority_keywords: [domestic regulator, service regulator, pressure regulator, DRS, PRS, MRS, RMS, gas filter, skid]

  vadodara_gas_limited:
    strategy: unstable_source_url_repair
    max_leads: 180
    source_urls:
      - url: https://www.vgl.co.in/tenders/
        kind: tender_pdf_archive
        reason: configured_vgl_tenders
    priority_keywords: [domestic meter, regulator, gas tap, pressure regulator, service regulator, PNG]
    retry_policy: browser_fetch_then_url_repair

  bharat_petroleum_bpcl_cgd:
    strategy: public_tender_scan
    max_leads: 150
    source_urls:
      - url: https://bharatpetroleum.in/tenders
        kind: public_tender_page
        reason: bpcl_tender_page
    priority_keywords: [CGD, gas regulator, pressure regulator, RMS, MRS, DRS, PRS, skid, filter]

  hindustan_petroleum_hpcl_cgd:
    strategy: alternative_source_needed
    max_leads: 80
    source_urls:
      - url: https://www.hindustanpetroleum.com/pages/tenders-and-contracts
        kind: public_tender_page
        reason: hpcl_tender_page
    priority_keywords: [CGD, regulator, RMS, MRS, DRS, PRS]

  gujarat_gas_ggl:
    strategy: public_page_plus_nprocure_reference
    max_leads: 150
    source_urls:
      - url: https://www.gujaratgas.com/tenders/
        kind: tender_page
        reason: ggl_public_tenders
    priority_keywords: [domestic regulator, service regulator, pressure regulator, nprocure, RMS, DRS, MRS]

  adani_total_gas_atgl:
    strategy: public_commercial_page
    max_leads: 120
    source_urls:
      - url: https://www.adanigas.com/commercials
        kind: commercial_tender_page
        reason: atgl_commercials
    priority_keywords: [tender, EOI, regulator, RMS, DRS, MRS, PRS, skid]
    noise_filters: [vendor registration form only, career]

  cppp_eprocure:
    strategy: aggregator_browser_or_endpoint
    max_leads: 120
    source_urls:
      - url: https://www.etenders.gov.in/eprocure/app
        kind: procurement_aggregator
        reason: cppp_public_search
    priority_keywords: [GAIL, BPCL, IOCL, HPCL, MNGL, EIL, gas regulator, pressure regulator, RMS, MRS, DRS, PRS, gas filter station]

  tenderwizard_eprocurement_technologies:
    strategy: aggregator_watch
    max_leads: 80
    priority_keywords: [gas regulator, pressure regulator, RMS, MRS, DRS, PRS, gas filter station]

  sap_ariba_discovery:
    strategy: aggregator_watch
    max_leads: 80
    priority_keywords: [gas regulator, pressure regulator, RMS, MRS, DRS, PRS, gas filter station]
