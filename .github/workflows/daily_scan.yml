name: Daily Tender Scan

on:
  schedule:
    # Her gun 05:00 UTC (TR saatiyle yaz saati 08:00, kis saati 07:00 civari)
    - cron: "0 5 * * *"
  workflow_dispatch: {}   # Actions sekmesinden manuel tetiklemeye izin ver

permissions:
  contents: write   # guncellenen xlsx dosyasini repoya commit edebilmek icin

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklari kur
        run: pip install -r requirements.txt

      - name: Taramayi calistir
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main

      - name: Guncellenen xlsx'i commitle
        run: |
          git config user.name "eska-tender-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/India_Procurement_Intelligence_Database.xlsx
          git diff --cached --quiet && echo "Degisiklik yok" || git commit -m "Otomatik tarama: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
