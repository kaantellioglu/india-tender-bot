name: Daily Tender Scan

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-tender-scan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Bagimliliklari kur
        run: pip install -r requirements.txt

      - name: Taramayi calistir
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main --max-pdf-parses 120

      - name: Dashboard JSON uret
        run: python -m scripts.export_to_json

      - name: Dashboard verisini dogrula
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("docs/data.json")
          if not p.exists():
              raise SystemExit("docs/data.json olusmadi")
          data = json.loads(p.read_text(encoding="utf-8"))
          dashboard = data.get("dashboard", {})
          print("generated_at:", dashboard.get("generated_at"))
          print("portal_count:", dashboard.get("portal_count"))
          print("tender_count:", dashboard.get("tender_count"))
          print("high_priority_count:", dashboard.get("high_priority_count"))
          print("failure_count:", dashboard.get("failure_count"))
          print("open_action_count:", dashboard.get("open_action_count"))
          required = ["dashboard", "portals", "tenders", "price_intelligence", "portal_health", "source_failures", "action_queue"]
          missing = [k for k in required if k not in data]
          if missing:
              raise SystemExit(f"data.json eksik alanlar: {missing}")
          PY

      - name: Guncellenen dosyalari commitle ve pushla
        run: |
          git config user.name "eska-tender-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/India_Procurement_Intelligence_Database.xlsx docs/data.json data/source_failures.json data/action_queue.json
          if git diff --cached --quiet; then
            echo "Degisiklik yok"
          else
            git commit -m "Otomatik tarama ve dashboard: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push origin main
          fi
